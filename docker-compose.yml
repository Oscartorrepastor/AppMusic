services:
  postgres:
    image: postgres:15-alpine
    container_name: appmusic-postgres
    restart: always
    environment:
      POSTGRES_USER: appmusic_user
      POSTGRES_PASSWORD: appmusic_password_2026
      POSTGRES_DB: appmusic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - appmusic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appmusic_user -d appmusic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: appmusic-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://appmusic_user:appmusic_password_2026@postgres:5432/appmusic_db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-to-a-random-secret-in-production-min-32-chars
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appmusic-network

volumes:
  postgres_data:
    driver: local

networks:
  appmusic-network:
    driver: bridge